<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — UCRS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-10">

  <div class="w-full max-w-md">
    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4 space-y-2">
          {% for category, message in messages %}
            <div class="px-4 py-3 rounded-lg border text-sm
              {% if category == 'success' %}bg-green-50 border-green-200 text-green-800
              {% elif category == 'error'   %}bg-red-50   border-red-200   text-red-800
              {% else                        %}bg-blue-50  border-blue-200  text-blue-800{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-blue-700">UCRS</h1>
        <p class="text-gray-500 text-sm mt-1">Create a Student Account</p>
      </div>

      <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
        <div class="space-y-5">
          <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
              Full Name
            </label>
            <input
              type="text" id="name" name="name" required autocomplete="name"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              placeholder="Jane Doe"
            />
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
              Email Address
            </label>
            <input
              type="email" id="email" name="email" required autocomplete="email"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              placeholder="you@ucrs.edu"
            />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
              Password
            </label>
            <input
              type="password" id="password" name="password" required autocomplete="new-password"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              placeholder="••••••••"
            />
          </div>

          <div>
            <label for="dept_id" class="block text-sm font-medium text-gray-700 mb-1">
              Department
            </label>
            <select
              id="dept_id" name="dept_id" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
              <option value="">-- Select Department --</option>
              {% for d in departments %}
              <option value="{{ d.dept_id }}">{{ d.dept_name }}</option>
              {% endfor %}
            </select>
          </div>

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                   py-2 px-4 rounded-lg text-sm transition">
            Create Account
          </button>
        </div>
      </form>

      <p class="text-sm text-center text-gray-500 mt-6">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="text-blue-600 hover:underline font-medium">
          Sign in
        </a>
      </p>
    </div>
  </div>

</body>
</html>
